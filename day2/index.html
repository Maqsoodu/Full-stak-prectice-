<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Profile Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile">
    <img src="pics/rafael-hoyos-weht-UuthGr6H0tM-unsplash.jpg" alt="profile">

    <div class="info">
        <h2>oggy_official</h2>
        <p>Oggy and the Cockroaches</p>

        <div class="stats">
            <span>1.4M followers</span>
            <span>22 following</span>
        </div>
    </div>
</div>

<div class="bio">
    <p>It's fast, crazy and hilarious...</p>
    <p>It's OGGY AND THE COCKROACHES!</p>
    <p>Oggy's Shop : Xilam.Shop</p>
</div>

<div class="tabs">
    <span>▦</span>
    <span>▶</span>
    <span>👤</span>
</div>

<div class="posts">
    <div class="post"><img src="pics/microsoft-copilot-e6W48UPKijo-unsplash.jpg"></div>
    <div class="post"><img src="pics/omar-prestwich-rjNB94O7CY4-unsplash.jpg"></div>
    <div class="post"><img src="pics/peter-thomas--lzlMB4Ks94-unsplash.jpg"></div>
    <div class="post"><img src="pics/pic1.jpg"></div>
    <div class="post"><img src="pics/pic2.jpg"></div>
    <div class="post"><img src="pics/rafael-hoyos-weht-UuthGr6H0tM-unsplash.jpg"></div>
</div>

</body>
</html>
